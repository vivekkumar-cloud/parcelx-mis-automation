name: ParcelX MIS Automation

on:
  schedule:
    - cron: '30 21 * * *'  #  3:00 AM IST
    - cron: '0 5 * * *'    # 10:30 AM IST
    - cron: '30 6 * * *'   # 12:00 PM IST
    - cron: '30 8 * * *'   #  2:00 PM IST
    - cron: '30 10 * * *'  #  4:00 PM IST
    - cron: '30 11 * * *'  #  5:00 PM IST
    - cron: '30 13 * * *'  #  7:00 PM IST
    - cron: '30 16 * * *'  # 10:00 PM IST
    - cron: '30 17 * * *'  # 11:00 PM IST

  workflow_dispatch:

jobs:
  run-mis-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run MIS Automation
        env:
          PARCELX_BASIC_USER: ${{ secrets.PARCELX_BASIC_USER }}
          PARCELX_BASIC_PASS: ${{ secrets.PARCELX_BASIC_PASS }}
          PARCELX_FORM_USER:  ${{ secrets.PARCELX_FORM_USER }}
          PARCELX_FORM_PASS:  ${{ secrets.PARCELX_FORM_PASS }}
        run: node src/index.js

      - name: Upload MIS file as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mis-report-${{ github.run_id }}
          path: downloads/*.csv
          retention-days: 7
